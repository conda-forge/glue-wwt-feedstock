{% set version = "0.8.0" %}

package:
  name: glue-wwt
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/glue-wwt/glue_wwt-{{ version }}.tar.gz
  sha256: 8ea68420ef6a07d453117284563d921a23f1e96ec8dd002817d6953c6b045769

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"
  noarch: python

requirements:

  host:
    - python {{ python_min }}
    - pip
    - setuptools >=30.3
    - setuptools_scm

  run:
    - python >={{ python_min }}
    - numpy
    - glue-core >=1.13.1
    - echo
    - qtpy
    - astropy-base
    - pywwt >=0.21.0
    - packaging
    - glue-qt
    - pyqtwebengine

test:
  requires:
    - python {{ python_min }}
  imports:
    - glue_wwt

about:
  home: https://github.com/glue-viz/glue-wwt
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: WorldWide Telescope viewer plugin for glue

extra:
  recipe-maintainers:
    - astrofrog
